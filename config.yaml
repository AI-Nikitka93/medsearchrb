app_name: MedsearchRB

runtime:
  output_dir: "%LOCALAPPDATA%\\MedsearchRB\\scraper"
  ingest_url: null
  ingest_token: null
  max_doctors_per_source: 0

http:
  timeout_seconds: 25
  max_attempts: 4
  min_delay_seconds: 2.2
  max_delay_seconds: 4.8
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36"

sources:
  aquaminsk:
    enabled: true
    robots_reviewed_at: "2026-03-30"
    notes:
      - "Используем официальный раздел /news/ Аква-Минск Клиники и берём только свежие service-promo публикации, исключая поздравления и служебные объявления."
  "103.by":
    enabled: true
    robots_reviewed_at: "2026-03-22"
    min_delay_seconds: 0.6
    max_delay_seconds: 1.2
    notes:
      - "Используем doctor detail pages из sitemap-staff.xml.gz и itemprop aggregateRating/reviewCount."
      - "Делаем bounded chunk crawl и более короткую respectful паузу, чтобы hourly review-sync успевал завершаться."
  "2doc.by":
    enabled: true
    robots_reviewed_at: "2026-03-23"
    insecure_tls: true
    notes:
      - "Используем sitemap-doctor.xml и inline doctor payload как hybrid discovery/review source."
  centrsna:
    enabled: true
    robots_reviewed_at: "2026-03-23"
    notes:
      - "Используем раздел /news/ как официальный источник новостей и акций Центра здорового сна."
  doctortut:
    enabled: true
    robots_reviewed_at: "2026-03-23"
    notes:
      - "Используем официальный раздел /sale/ для акций и скидок центра Доктор Тут."
  "doktora.by":
    enabled: true
    robots_reviewed_at: "2026-03-22"
    crawl_delay_seconds: 10
    notes:
      - "Используем paginated раздел отзывов и соблюдаем Crawl-delay: 10."
  eclinic:
    enabled: true
    robots_reviewed_at: "2026-03-23"
    notes:
      - "Используем /news/ и фильтруем промо-материалы по ключевым словам."
  forestmed:
