app_name: MedsearchRB

runtime:
  output_dir: "%LOCALAPPDATA%\\MedsearchRB\\scraper"
  ingest_url: null
  ingest_token: null
  max_doctors_per_source: 0

http:
  timeout_seconds: 25
  max_attempts: 4
  min_delay_seconds: 2.2
  max_delay_seconds: 4.8
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36"

sources:
  "103.by":
    enabled: true
    robots_reviewed_at: "2026-03-22"
    min_delay_seconds: 0.6
    max_delay_seconds: 1.2
    notes:
      - "Используем doctor detail pages из sitemap-staff.xml.gz и itemprop aggregateRating/reviewCount."
      - "Делаем bounded chunk crawl и более короткую respectful паузу, чтобы hourly review-sync успевал завершаться."
  "2doc.by":
    enabled: true
    robots_reviewed_at: "2026-03-23"
    insecure_tls: true
    notes:
      - "Используем sitemap-doctor.xml и inline doctor payload как hybrid discovery/review source."
  "doktora.by":
    enabled: true
    robots_reviewed_at: "2026-03-22"
    crawl_delay_seconds: 10
    notes:
      - "Используем paginated раздел отзывов и соблюдаем Crawl-delay: 10."
  kravira:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную страницу акций официального сайта."
  lode:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную news-ленту и фильтруем промо-материалы по заголовкам и content."
  lighthouse:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную страницу акций и официальный сайт клиники."
  medavenu:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную страницу акций /akcii/ официального сайта."
  medart:
    enabled: true
    robots_reviewed_at: "2026-03-21"
    notes:
      - "Публичные страницы специалистов и акций доступны без авторизации."
  nordin:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную страницу акций и скидок /shares и связанные промо-страницы."
  smartmedical:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную ленту /news и фильтруем промо-материалы по ключевым словам."
  supramed:
    enabled: true
    robots_reviewed_at: "2026-03-22"
    notes:
      - "Используем публичную страницу /sales официального сайта."
  ydoc:
    enabled: true
    robots_reviewed_at: "2026-03-21"
    min_delay_seconds: 0.8
    max_delay_seconds: 1.4
    notes:
      - "Используем только doctor list/detail страницы и summary review metrics."
      - "Каталог врачей режется на bounded specialty buckets, чтобы cloud sync не упирался в 4h timeout."
