name: promo-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: medsearchrb-promo-sync
  cancel-in-progress: true

jobs:
  promo-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            apps/miniapp/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm --prefix apps/worker ci --no-audit --prefer-offline
          npm --prefix apps/miniapp ci --no-audit --prefer-offline

      - name: Run promo sources to batch file
        env:
          MAX_DOCTORS_PER_SOURCE: "0"
        run: >
          python -m apps.scrapers.main
          --sources centrsna doctortut eclinic forestmed kaskad kravira lighthouse lifecity lode medart medavenu mrtby neomedical nordin sante smartmedical supramed
          --output-mode file
          --log-level INFO

      - name: Backfill promo batch to Turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: >
          npm --prefix apps/worker run catalog:backfill --
          --batch-file "$HOME/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json"
          --chunk-size 50

      - name: Flush promotion posts to Telegram channel
        env:
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          request = urllib.request.Request(
              "https://medsearchrb-api.aiomdurman.workers.dev/internal/notifications/promotions/flush",
              method="POST",
              headers={
                  "Authorization": f"Bearer {os.environ['INGEST_SHARED_SECRET']}",
                  "Content-Type": "application/json",
                  "User-Agent": "MedsearchRB-GitHubActions/1.0",
              },
              data=b"{}",
          )

          with urllib.request.urlopen(request, timeout=120) as response:
              payload = json.loads(response.read().decode("utf-8"))
              print(json.dumps(payload, ensure_ascii=False))
          PY

      - name: Verify live promo total
        run: |
          python - <<'PY'
          import json
          import urllib.request

          request = urllib.request.Request(
              "https://medsearchrb-api.aiomdurman.workers.dev/api/v1/promotions?page=1&per_page=1",
              headers={"User-Agent": "MedsearchRB-GitHubActions/1.0"},
          )

          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.loads(response.read().decode("utf-8"))
              print(json.dumps({"total": payload["total"]}, ensure_ascii=False))
          PY

      - name: Skip Mini App publish
        run: |
          echo "Mini App publish is intentionally decoupled from promo sync to protect the stable gh-pages release."

      - name: Upload promo batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: promo-source-batch
          path: ~/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json
          if-no-files-found: warn
