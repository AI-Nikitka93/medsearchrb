name: clinic-site-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "20 */6 * * *"

permissions:
  contents: read

concurrency:
  group: medsearchrb-clinic-site-sync
  cancel-in-progress: true

jobs:
  clinic-site-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            apps/miniapp/package-lock.json

      - name: Install dependencies
        run: |
          npm --prefix apps/worker ci --no-audit --prefer-offline
          npm --prefix apps/miniapp ci --no-audit --prefer-offline

      - name: Apply database migrations
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: npm --prefix apps/worker run db:migrate

      - name: Backfill official clinic sites from YDoc clinic pages
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: >
          npm --prefix apps/worker run verify:clinics --
          --source ydoc
          --all

      - name: Audit official clinic sites and suppress broken ones
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: >
          npm --prefix apps/worker run clinics:health --
          --all
          --max-failures 3

      - name: Summarize clinic health
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          cd apps/worker
          npx tsx -e "
          import { createClient } from '@libsql/client';
          (async () => {
            const client = createClient({ url: process.env.TURSO_DATABASE_URL, authToken: process.env.TURSO_AUTH_TOKEN });
            const result = await client.execute(\`
              SELECT
                site_health_status,
                COUNT(*) AS total
              FROM clinics
              WHERE site_url IS NOT NULL
                AND site_url <> ''
              GROUP BY site_health_status
              ORDER BY total DESC
            \`);
            console.log(JSON.stringify(result.rows, null, 2));
          })().catch((error) => {
            console.error(error instanceof Error ? error.stack ?? error.message : error);
            process.exit(1);
          });
          "

      - name: Build Mini App snapshot
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          npm --prefix apps/miniapp run build

      - name: Deploy Mini App to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --prefix apps/miniapp netlify deploy
          --site "$NETLIFY_SITE_ID"
          --auth "$NETLIFY_AUTH_TOKEN"
          --prod
          --dir apps/miniapp/out
          --message "clinic-site-sync snapshot refresh"
          --json
