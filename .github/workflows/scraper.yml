name: doctor-catalog-sync

on:
  workflow_dispatch:
  schedule:
    - cron: "15 1 * * *"

permissions:
  contents: read

concurrency:
  group: medsearchrb-doctor-catalog-sync
  cancel-in-progress: true

jobs:
  ydoc-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            apps/miniapp/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm --prefix apps/worker ci --no-audit --prefer-offline
          npm --prefix apps/miniapp ci --no-audit --prefer-offline

      - name: Run YDoc catalog scraper
        env:
          MAX_DOCTORS_PER_SOURCE: "0"
        run: >
          python -m apps.scrapers.main
          --sources ydoc
          --output-mode file
          --log-level INFO

      - name: Backfill YDoc batch to Turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: >
          npm --prefix apps/worker run catalog:backfill --
          --batch-file "$HOME/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json"
          --chunk-size 100

      - name: Verify live doctor total
        run: |
          python - <<'PY'
          import json
          import urllib.request

          request = urllib.request.Request(
              "https://medsearchrb-api.aiomdurman.workers.dev/api/v1/doctors?page=1&per_page=1",
              headers={"User-Agent": "MedsearchRB-GitHubActions/1.0"},
          )

          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.loads(response.read().decode("utf-8"))
              print(json.dumps({"total": payload["total"]}, ensure_ascii=False))
          PY

      - name: Build Mini App snapshot
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          npm --prefix apps/miniapp run build

      - name: Deploy Mini App to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --yes netlify-cli@24.4.0 deploy
          --site "$NETLIFY_SITE_ID"
          --auth "$NETLIFY_AUTH_TOKEN"
          --no-build
          --prod
          --dir apps/miniapp/out
          --message "doctor-catalog snapshot refresh"
          --json

      - name: Upload YDoc batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: ydoc-source-batch
          path: ~/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json
          if-no-files-found: warn
