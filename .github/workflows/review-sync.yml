name: review-sync

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: medsearchrb-review-sync-smoke
  cancel-in-progress: true

jobs:
  doctor-review-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            apps/miniapp/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm --prefix apps/worker ci --no-audit --prefer-offline
          npm --prefix apps/miniapp ci --no-audit --prefer-offline

      - name: Run review sources to batch file
        env:
          MAX_DOCTORS_PER_SOURCE: "20"
          BY103_URL_LIMIT: "20"
          DOKTORA_PAGE_LIMIT: "2"
        run: >
          python -m apps.scrapers.main
          --sources by103 doktora
          --output-mode file
          --log-level INFO

      - name: Backfill review batch to Turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: >
          npm --prefix apps/worker run catalog:backfill --
          --batch-file "$HOME/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json"
          --chunk-size 75

      - name: Verify review source coverage
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          cd apps/worker
          npx tsx -e "
          import { createClient } from '@libsql/client';
          (async () => {
            const client = createClient({
              url: process.env.TURSO_DATABASE_URL,
              authToken: process.env.TURSO_AUTH_TOKEN,
            });
            const result = await client.execute(\`
              SELECT source_name, COUNT(*) AS rows_count
              FROM reviews_summary
              WHERE source_name IN ('103.by', 'doktora.by')
              GROUP BY source_name
              ORDER BY source_name ASC
            \`);
            console.log(JSON.stringify(result.rows, null, 2));
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          "

      - name: Build Mini App snapshot
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          npm --prefix apps/miniapp run build

      - name: Deploy Mini App to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --yes netlify-cli@24.4.0 deploy
          --site "$NETLIFY_SITE_ID"
          --auth "$NETLIFY_AUTH_TOKEN"
          --prod
          --dir apps/miniapp/out
          --message "review-smoke snapshot refresh"
          --json

      - name: Upload review batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-source-batch-smoke
          path: ~/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json
          if-no-files-found: warn
