name: review-sync-doktora

on:
  workflow_dispatch:
  schedule:
    - cron: "40 * * * *"

permissions:
  contents: read

concurrency:
  group: medsearchrb-review-sync-doktora
  cancel-in-progress: true

jobs:
  review-sync-doktora:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            apps/miniapp/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm --prefix apps/worker ci --no-audit --prefer-offline
          npm --prefix apps/miniapp ci --no-audit --prefer-offline

      - name: Compute doktora.by page window
        id: chunk
        env:
          PAGE_CHUNK_SIZE: "6"
        run: |
          python - <<'PY'
          import json
          import math
          import os
          import re
          import urllib.request

          request = urllib.request.Request(
              "https://doktora.by/otzyvy-o-vrachah-belarusi?page=1",
              headers={"User-Agent": "MedsearchRB-GitHubActions/1.0"},
          )
          with urllib.request.urlopen(request, timeout=90) as response:
              html = response.read().decode("utf-8", "ignore")

          pages = [1]
          for match in re.finditer(r"[?&]page=(\d+)", html):
              pages.append(int(match.group(1)))

          total_pages = max(pages)
          page_chunk_size = max(1, int(os.environ["PAGE_CHUNK_SIZE"]))
          total_chunks = max(1, math.ceil(total_pages / page_chunk_size))
          run_number = int(os.environ["GITHUB_RUN_NUMBER"])
          chunk_index = (run_number - 1) % total_chunks
          page_offset = 1 + chunk_index * page_chunk_size

          payload = {
              "total_pages": total_pages,
              "page_chunk_size": page_chunk_size,
              "total_chunks": total_chunks,
              "chunk_index": chunk_index,
              "page_offset": page_offset,
          }
          print(json.dumps(payload, ensure_ascii=False))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in payload.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Run doktora.by review window to batch file
        env:
          MAX_DOCTORS_PER_SOURCE: "30"
          DOKTORA_PAGE_OFFSET: ${{ steps.chunk.outputs.page_offset }}
          DOKTORA_PAGE_LIMIT: ${{ steps.chunk.outputs.page_chunk_size }}
        run: >
          python -m apps.scrapers.main
          --sources doktora
          --output-mode file
          --log-level INFO

      - name: Backfill doktora.by review batch to Turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: >
          npm --prefix apps/worker run catalog:backfill --
          --batch-file "$HOME/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json"
          --chunk-size 75

      - name: Verify doktora.by review coverage
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          cd apps/worker
          npx tsx -e "
          import { createClient } from '@libsql/client';
          (async () => {
            const client = createClient({
              url: process.env.TURSO_DATABASE_URL,
              authToken: process.env.TURSO_AUTH_TOKEN,
            });
            const result = await client.execute(\`
              SELECT source_name, COUNT(*) AS rows_count
              FROM reviews_summary
              WHERE source_name = 'doktora.by'
              GROUP BY source_name
            \`);
            console.log(JSON.stringify(result.rows, null, 2));
          })().catch((error) => {
            console.error(error instanceof Error ? error.stack ?? error.message : error);
            process.exit(1);
          });
          "

      - name: Build Mini App snapshot
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          npm --prefix apps/miniapp run build

      - name: Deploy Mini App to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: >
          npx --yes netlify-cli@24.4.0 deploy
          --site "$NETLIFY_SITE_ID"
          --auth "$NETLIFY_AUTH_TOKEN"
          --prod
          --dir apps/miniapp/out
          --message "review-sync-doktora snapshot refresh"
          --json

      - name: Upload doktora.by review batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-source-batch-doktora
          path: ~/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json
          if-no-files-found: warn
