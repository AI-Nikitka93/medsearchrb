name: review-sync-2doc

on:
  workflow_dispatch:
  schedule:
    - cron: "55 * * * *"

permissions:
  contents: write

concurrency:
  group: medsearchrb-review-sync-2doc
  cancel-in-progress: true

jobs:
  review-sync-2doc:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            apps/worker/package-lock.json
            apps/miniapp/package-lock.json

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          npm --prefix apps/worker ci --no-audit --prefer-offline
          npm --prefix apps/miniapp ci --no-audit --prefer-offline

      - name: Run 2doc review chunk to batch file
        env:
          MAX_DOCTORS_PER_SOURCE: "25"
        run: >
          python -m apps.scrapers.main
          --sources 2doc
          --output-mode file
          --log-level INFO

      - name: Backfill 2doc review batch to Turso
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          INGEST_SHARED_SECRET: ${{ secrets.INGEST_SHARED_SECRET }}
        run: >
          npm --prefix apps/worker run catalog:backfill --
          --batch-file "$HOME/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json"
          --chunk-size 75

      - name: Verify 2doc review coverage
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: |
          cd apps/worker
          npx tsx -e "
          import { createClient } from '@libsql/client';
          (async () => {
            const client = createClient({
              url: process.env.TURSO_DATABASE_URL,
              authToken: process.env.TURSO_AUTH_TOKEN,
            });
            const result = await client.execute(\`
              SELECT source_name, COUNT(*) AS rows_count
              FROM reviews_summary
              WHERE source_name = '2doc.by'
              GROUP BY source_name
            \`);
            console.log(JSON.stringify(result.rows, null, 2));
          })().catch((error) => {
            console.error(error instanceof Error ? error.stack ?? error.message : error);
            process.exit(1);
          });
          "

      - name: Build Mini App snapshot
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          NEXT_PUBLIC_BASE_PATH: /medsearchrb
        run: |
          npm --prefix apps/miniapp run build

      - name: Publish Mini App to GitHub Pages
        run: |
          bash ./scripts/publish-miniapp-gh-pages.sh

      - name: Upload 2doc review batch artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-source-batch-2doc
          path: ~/.local/share/MedsearchRB/scraper/batches/latest-source-batch.json
          if-no-files-found: warn
